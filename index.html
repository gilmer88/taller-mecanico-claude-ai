<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de gestion de taller mecanico">
    <title>Taller mecánico - Dashboard</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

</head>
<body>

    <aside class="sidebar">
        <!--navegacion lateral-->

        <div class="sidebar__logo">
            <span class="sidebar__logo-icon"><i class="fa-solid fa-gear"></i></span>
            <span class="sidebar__logo-text">TallerPro</span>
        </div>

        <nav class="sidebar__nav">
            <ul>
                <li class="sidebar__item sidebar__item--active">
                    <a href="#" class="sidebar__link">
                        <span class="sidebar__icon"><i class="fa-solid fa-house"></i></span>
                        <span class="sidebar__label">Dashboard</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a href="#" class="sidebar__link">
                        <span class="sidebar__icon"><i class="fa-solid fa-wrench"></i></span>
                        <span class="sidebar__label">Órdenes</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a href="#" class="sidebar__link">
                        <span class="sidebar__icon"><i class="fa-solid fa-users"></i></span>
                        <span class="sidebar__label">Clientes</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a href="#" class="sidebar__link">
                        <span class="sidebar__icon"><i class="fa-solid fa-car"></i></span>
                        <span class="sidebar__label">Vehículos</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a href="#" class="sidebar__link">
                        <span class="sidebar__icon"><i class="fa-solid fa-chart-bar"></i></span>
                        <span class="sidebar__label">Reportes</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a href="#" class="sidebar__link">
                        <span class="sidebar__icon"><i class="fa-solid fa-gear"></i></span>
                        <span class="sidebar__label">Configuración</span>
                    </a>
                </li>

            </ul>

        </nav>

    </aside>

    <div class="wrapper">
        
        <header class="topbar">
            <!--barra superior-->
        </header>

        <main class="main-content">
            
            <section class="stats">
                <!--tarjetas metricas-->
            </section>

            <section class="orders">
                <!--tabla de ordenes-->
            </section>
        </main>
    </div>
    
</body>
</html>
